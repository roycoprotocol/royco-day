name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

# A superseded run on the same ref is dead weight: cancel it so rapid pushes don't queue redundant builds
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    strategy:
      fail-fast: true

    name: Foundry project
    runs-on: ubuntu-latest
    steps:
      # Submodules are intentionally NOT fetched here: they are restored from a content-addressed
      # cache below and only fetched from source on a cache miss (i.e. when a submodule pin moves).
      - uses: actions/checkout@v4

      - name: Compute submodule cache key
        # The key digests the gitlink SHAs recorded in this commit's tree, so it is an exact
        # content address for lib/: any submodule bump (including nested pins, which are part of
        # the parent submodule's tree) produces a new key. Exact-match only — a stale lib/ must
        # never be reused since forge compiles whatever sources are on disk.
        id: submodule-key
        run: echo "hash=$(git ls-tree HEAD lib/ | sha256sum | cut -c1-16)" >> "$GITHUB_OUTPUT"

      - name: Cache submodule dependencies
        id: deps-cache
        uses: actions/cache@v4
        with:
          path: lib
          key: forge-deps-${{ runner.os }}-${{ steps.submodule-key.outputs.hash }}

      - name: Install submodule dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: git submodule update --init --recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          # Pinned to stable 1.7.1.
          version: "1.7.1"
          # The toolchain's built-in cache only covers ~/.foundry/cache/rpc; we manage that
          # explicitly below (alongside solc binaries) so all cache keys live in this file.
          cache: false

      - name: Show Forge version
        run: |
          forge --version

      - name: Cache solc binaries
        # svm-managed compilers are immutable per version; the key proxies the pinned
        # solc_version through foundry.toml. The prefix restore is safe — forge downloads any
        # missing version itself, and extra cached versions are inert.
        uses: actions/cache@v4
        with:
          path: ~/.svm
          key: svm-${{ runner.os }}-${{ hashFiles('foundry.toml') }}
          restore-keys: |
            svm-${{ runner.os }}-

      - name: Cache RPC fork state
        # Fork suites pin block numbers, and RPC responses for a pinned (chain, block) are
        # immutable, so reusing them cannot change test outcomes — it only removes archive-node
        # round trips. Exact key per commit; prefix restore reuses (and accumulates onto) the
        # newest prior state. No-op until the fork RPC secrets are configured.
        uses: actions/cache@v4
        with:
          path: ~/.foundry/cache/rpc
          key: forge-rpc-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            forge-rpc-${{ runner.os }}-

      - name: Cache Forge build artifacts
        # Incremental compiles: cold via_ir builds are slow. Exact key per commit; prefix restore
        # reuses the newest prior build. Veracity is unaffected: forge revalidates every cached
        # artifact against the content hash of its sources, so a stale restore can only save
        # work, never compile the wrong code.
        uses: actions/cache@v4
        with:
          path: |
            cache
            out
          key: forge-build-${{ runner.os }}-${{ hashFiles('foundry.toml', 'remappings.txt') }}-${{ github.sha }}
          restore-keys: |
            forge-build-${{ runner.os }}-${{ hashFiles('foundry.toml', 'remappings.txt') }}-

      - name: Run Forge fmt
        run: |
          forge fmt --check
        id: fmt
        # Blocking on PRs (enforce style on contributions); advisory on push to main and
        # manual dispatch, so a formatting diff never hides build/test breakage on main.
        continue-on-error: ${{ github.event_name != 'pull_request' }}

      - name: Run Forge build
        # Full build first (tests, scripts, mocks), then size-check only src/ —
        # EIP-170 applies to deployed contracts; test-only mocks may exceed it.
        # test/research/** is excluded by the default profile in foundry.toml (offline-analysis suites
        # that OOM-kill the 7GB hosted runner); run them deliberately via FOUNDRY_PROFILE=research.
        run: |
          forge build
          forge build src/ --sizes
        id: build

      - name: Run Forge tests
        # Fork suites (everything under test/fork/) run against live-chain forks and need
        # archive-node RPC URLs. Which chains they need is derived from the fork tree itself
        # (every *_RPC_URL env var the suites reference), so supporting a new chain never
        # requires editing this step — just pass its secret in `env` below. If any required RPC
        # secret is unset we skip test/fork/** so the rest of the tests still run; once the
        # secrets are added the fork tests run automatically.
        run: |
          required=$(grep -rhoE '\b[A-Z][A-Z0-9_]*_RPC_URL\b' test/fork | sort -u)
          missing=""
          for var in $required; do
            if [ -z "$(printenv "$var")" ]; then missing="$missing $var"; fi
          done
          if [ -n "$missing" ]; then
            echo "Missing fork RPC secrets:$missing — skipping fork suites (test/fork/**)"
            forge test -vvv --no-match-path 'test/fork/**'
          else
            forge test -vvv
          fi
        id: test
        env:
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
          AVALANCHE_RPC_URL: ${{ secrets.AVALANCHE_RPC_URL }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          ARBITRUM_RPC_URL: ${{ secrets.ARBITRUM_RPC_URL }}
          # Deliberately overrides profile.ci's 1,000 runs on the hosted runner (env beats foundry.toml):
          # local `FOUNDRY_PROFILE=ci forge test` keeps the full depth, CI pins 200 for runtime, and the
          # secret can raise it without a workflow change.
          FOUNDRY_FUZZ_RUNS: ${{ secrets.FOUNDRY_FUZZ_RUNS || 200 }}
