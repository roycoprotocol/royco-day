name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    strategy:
      fail-fast: true

    name: Foundry project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          # Symbolic testing (forge test --symbolic) is not in a stable release yet; this nightly
          # matches the version verified locally. Bump to the next stable once symbolic ships in one.
          version: "nightly-0a8e2a09b7740b852af4a65409eea7322f48a918"

      - name: Install z3 (SMT solver for symbolic tests)
        run: sudo apt-get update && sudo apt-get install -y z3

      - name: Show Forge version
        run: |
          forge --version

      - name: Run Forge fmt
        run: |
          forge fmt --check
        id: fmt
        # Blocking on PRs (enforce style on contributions); advisory on push to main and
        # manual dispatch, so a formatting diff never hides build/test breakage on main.
        continue-on-error: ${{ github.event_name != 'pull_request' }}

      - name: Run Forge build
        run: |
          forge build --sizes
        id: build

      - name: Run Forge tests
        # Fork suites (everything under test/fork/) run against live-chain forks and need
        # archive-node RPC URLs. Which chains they need is derived from the fork tree itself
        # (every *_RPC_URL env var the suites reference), so supporting a new chain never
        # requires editing this step — just pass its secret in `env` below. If any required RPC
        # secret is unset we skip test/fork/** so the rest of the tests still run; once the
        # secrets are added the fork tests run automatically.
        run: |
          required=$(grep -rhoE '\b[A-Z][A-Z0-9_]*_RPC_URL\b' test/fork | sort -u)
          missing=""
          for var in $required; do
            if [ -z "$(printenv "$var")" ]; then missing="$missing $var"; fi
          done
          if [ -n "$missing" ]; then
            echo "Missing fork RPC secrets:$missing — skipping fork suites (test/fork/**)"
            forge test -vvv --no-match-path 'test/fork/**'
          else
            forge test -vvv
          fi
        id: test
        env:
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
          AVALANCHE_RPC_URL: ${{ secrets.AVALANCHE_RPC_URL }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          ARBITRUM_RPC_URL: ${{ secrets.ARBITRUM_RPC_URL }}
          FOUNDRY_FUZZ_RUNS: ${{ secrets.FOUNDRY_FUZZ_RUNS || 200 }}

      - name: Run symbolic tests
        # check_*/prove_* specs are only discovered under --symbolic; they prove math properties
        # over the whole bounded input domain with an SMT solver (z3) instead of sampling.
        # Scoped to test/symbolic/ so the invariant suites don't also get re-run symbolically.
        run: |
          forge test --symbolic --match-path 'test/symbolic/**' -vvv
        id: symbolic
