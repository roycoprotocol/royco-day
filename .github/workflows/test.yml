name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    strategy:
      fail-fast: true

    name: Foundry project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: "1.7.1"

      - name: Show Forge version
        run: |
          forge --version

      - name: Run Forge fmt
        run: |
          forge fmt --check
        id: fmt
        # Blocking on PRs (enforce style on contributions); advisory on push to main and
        # manual dispatch, so a formatting diff never hides build/test breakage on main.
        continue-on-error: ${{ github.event_name != 'pull_request' }}

      - name: Run Forge build
        run: |
          forge build --sizes
        id: build

      - name: Run Forge tests
        # Fork suites need an archive-node RPC (the MAINNET_RPC_URL secret), not yet set on
        # this repo. Exclude them so the PR gate runs the fork-free suite; when the secret is
        # added, delete the --no-match-contract filter to re-enable Neutrl/factory/deploy forks.
        run: |
          forge test -vvv --no-match-contract 'Neutrl_snUSD|DayMarketDeploymentTest|RoycoFactoryTest'
        id: test
        env:
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
          AVALANCHE_RPC_URL: ${{ secrets.AVALANCHE_RPC_URL }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          ARBITRUM_RPC_URL: ${{ secrets.ARBITRUM_RPC_URL }}
          FOUNDRY_FUZZ_RUNS: ${{ secrets.FOUNDRY_FUZZ_RUNS || 1000 }}
