[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = [
    "@balancer-labs/v3-interfaces/=lib/balancer-v3-monorepo/pkg/interfaces/",
    "@balancer-labs/v3-solidity-utils/=lib/balancer-v3-monorepo/pkg/solidity-utils/",
    "@balancer-labs/v3-vault/=lib/balancer-v3-monorepo/pkg/vault/",
    "@balancer-labs/v3-pool-utils/=lib/balancer-v3-monorepo/pkg/pool-utils/",
    "@balancer-labs/v3-pool-gyro/=lib/balancer-v3-monorepo/pkg/pool-gyro/",
    "@balancer-labs/v3-standalone-utils/=lib/balancer-v3-monorepo/pkg/standalone-utils/",
]
optimizer = true
optimizer_runs = 1666
bytecode_hash = "none"
cbor_metadata = false
sparse_mode = false
build_info = true
evm_version = "prague"
via_ir = true
deny = "never"
fs_permissions = [{ access = "read", path = "./out" }, { access = "read-write", path = "./output" }]
solc_version = "0.8.35"
ignored_warnings_from = ["test/*", "lib/*"]
show_progress = true

[profile.development]
optimizer = true
optimizer_runs = 1
via_ir = true

[profile.default.optimizer_details]
constantOptimizer = true
yul = true

[profile.default.optimizer_details.yulDetails]
stackAllocation = true

[fmt]
line_length = 160
wrap_comments = false
bracket_spacing = true
number_underscore = "thousands"
int_types = "long"
multiline_func_header = "all"
quote_style = "double"
ignore = ["libs/*", "*.t.sol"]
sort_imports = true

[lint]
exclude_lints = ["mixed-case-function", "mixed-case-variable", "unsafe-typecast", "pascal-case-struct", "unwrapped-modifier-logic", "erc20-unchecked-transfer"]

[fuzz]
runs = 200
show_logs = true

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
avalanche = { key = "${AVALANCHE_API_KEY}" }
arbitrum = { key = "${ARBITRUM_API_KEY}" }
base = { key = "${BASE_API_KEY}" }